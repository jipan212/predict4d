name: Build APK FINAL STABLE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # Install dependencies
      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            build-essential \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev \
            wget curl

      # Paksa Java 17
      - name: Set Java 17
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
          java -version

      # Install Android SDK (FIX ALL ERROR)
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip

          mkdir -p cmdline-tools/latest

          if [ -d "cmdline-tools/bin" ]; then
            mv cmdline-tools/* cmdline-tools/latest/
          else
            mv cmdline-tools/* cmdline-tools/latest/ || true
          fi

          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

          yes | sdkmanager --licenses

          sdkmanager "platform-tools" \
                     "platforms;android-31" \
                     "build-tools;30.0.3"

      # Set environment
      - name: Set environment
        run: |
          echo "ANDROIDSDK=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDAPI=31" >> $GITHUB_ENV
          echo "ANDROIDMINAPI=21" >> $GITHUB_ENV

      # Install Python
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      # Clean build
      - name: Clean
        run: buildozer android clean

      # Build APK
      - name: Build APK
        run: buildozer android debug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
