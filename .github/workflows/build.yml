name: Build APK & AAB

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Install Python, Buildozer, Cython
      - name: Install Python & Buildozer
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk wget
          pip install --upgrade pip
          pip install buildozer cython

      # 3️⃣ Install Android SDK + build-tools (fix AIDL)
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -o commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;31.0.0"

      # 4️⃣ Set Android environment variables
      - name: Set Android environment
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/platform-tools:$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV

      # 5️⃣ Build APK debug
      - name: Build APK debug
        run: buildozer android debug

      # 6️⃣ Build AAB release
      - name: Build AAB release
        run: buildozer android release

      # 7️⃣ Upload artifacts (APK & AAB)
      - name: Upload APK & AAB
        uses: actions/upload-artifact@v4
        with:
          name: android_build
          path: |
            bin/*.apk
            bin/*.aab
