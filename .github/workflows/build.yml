name: Build 4DPredictor APK & AAB

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk wget
          pip install --upgrade pip
          pip install buildozer cython

      # 3️⃣ Download Android cmdline-tools
      - name: Download Android cmdline-tools
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d tmp_cmdline
          mkdir -p cmdline-tools/latest
          mv tmp_cmdline/cmdline-tools/* cmdline-tools/latest/
          rm -rf tmp_cmdline

      # 4️⃣ Setup ANDROID_SDK_ROOT and accept licenses
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # 5️⃣ Set environment variables
      - name: Set Android environment
        run: |
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/.buildozer/android/platform/platform-tools:$HOME/.buildozer/android/platform/cmdline-tools/latest/bin:$HOME/.buildozer/android/platform/build-tools/33.0.2" >> $GITHUB_ENV

      # 6️⃣ Build APK debug
      - name: Build APK debug
        run: buildozer android debug

      # 7️⃣ Build AAB release
      - name: Build AAB release
        run: buildozer android release

      # 8️⃣ Upload artifacts
      - name: Upload APK & AAB
        uses: actions/upload-artifact@v4
        with:
          name: 4DPredictor_build
          path: |
            bin/*.apk
            bin/*.aab
