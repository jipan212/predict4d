name: Build 4DPredictor APK & AAB

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk wget
          pip install --upgrade pip
          pip install buildozer cython

      # 3️⃣ Install Android SDK cmdline-tools
      - name: Install Android SDK cmdline-tools
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          # zip menghasilkan folder cmdline-tools/
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/

      # 4️⃣ Accept licenses & install platform & build-tools
      - name: Setup Android SDK
        run: |
          yes | ~/.buildozer/android/platform/cmdline-tools/latest/bin/sdkmanager --licenses
          ~/.buildozer/android/platform/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # 5️⃣ Set environment variables
      - name: Set Android environment
        run: |
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/.buildozer/android/platform/android-sdk/platform-tools:$HOME/.buildozer/android/platform/cmdline-tools/latest/bin:$HOME/.buildozer/android/platform/android-sdk/build-tools/33.0.2" >> $GITHUB_ENV

      # 6️⃣ Build APK debug
      - name: Build APK debug
        run: buildozer android debug

      # 7️⃣ Build AAB release
      - name: Build AAB release
        run: buildozer android release

      # 8️⃣ Upload artifacts (APK & AAB)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 4dpredictor_build
          path: |
            bin/*.apk
            bin/*.aab
